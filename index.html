<!DOCTYPE html>
<html>
<head>
    <style>

body{
    font-family: Arial;
    margin:20px;
}

#chat{
    height:500px;
    overflow-y:auto;
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;
}

.user{
    text-align:right;
    margin:10px;
}

.bot{
    text-align:left;
    margin:10px;
}

.bubble{
    display:inline-block;
    padding:10px;
    border-radius:12px;
    max-width:70%;
}

.user .bubble{
    background:#dcf8c6;
}

.bot .bubble{
    background:#f1f0f0;
}

</style>
</head>
<body>

<h1>Policy Chatbot</h1>

<div id="chat"></div>

<input
    type="text"
    id="question"
    placeholder="Ask a question..."
    style="width:400px"
/>

<button onclick="askQuestion()">
    Send
</button>

<p id="answer"></p>

<script>


async function askQuestion() {

    const question =
        document.getElementById("question").value;

    if(!question) return;

    const chat =
        document.getElementById("chat");

    chat.innerHTML += `
        <div class="user">
            <div class="bubble">
                ${question}
            </div>
        </div>
    `;

    document.getElementById("question").value = "";

    const response = await fetch(
        "http://127.0.0.1:8000/ask",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                question:question
            })
        }
    );

    const data = await response.json();

    chat.innerHTML += `
        <div class="bot">
            <div class="bubble">
                ${data.answer}
            </div>
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}


</script>

</body>
</html>
